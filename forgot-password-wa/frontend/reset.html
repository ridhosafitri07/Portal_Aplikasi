<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>
  <style>
    * { 
      box-sizing: 
      border-box; 
      margin: 0; 
      padding: 0; 
    }

    body { 
      font-family: 'Segoe UI', sans-serif; 
      background: #EBF5FB; 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }

    .card { 
      background: #fff; 
      border-radius: 16px; 
      box-shadow: 0 4px 24px rgba(0,100,200,0.1); 
      padding: 40px 36px; 
      width: 100%; 
      max-width: 420px; 
    }

    h2 { 
      text-align: center; 
      color: #1565C0; 
      font-size: 22px; 
      margin-bottom: 8px; 
    }

    p.subtitle { 
      text-align: center; 
      color: #607D8B; 
      font-size: 13px; 
      margin-bottom: 28px; 
    }

    label { 
      font-size: 13px; 
      color: #37474F; 
      font-weight: 600; 
      display: block; 
      margin-bottom: 6px; 
    }

    .input-wrap { 
      position: relative; 
    }

    input[type=password], input[type=text] { 
      width: 100%; 
      padding: 11px 40px 11px 14px; 
      border: 1.5px solid #BBDEFB; 
      border-radius: 8px; 
      font-size: 14px; 
      color: #263238; 
      outline: none; 
      transition: border 0.2s; 
    }

    input:focus { 
      border-color: #1976D2; 
    }
 
    .toggle-pw { 
      position: absolute; 
      right: 12px; 
      top: 50%; 
      transform: translateY(-50%); 
      cursor: pointer; 
      color: #90A4AE; 
      font-size: 16px; 
      user-select: none; 
    }

    .field { 
      margin-bottom: 18px; 
    }

    button { 
      width: 100%; 
      padding: 12px; 
      background: #1976D2; 
      color: #fff; 
      font-size: 15px; 
      font-weight: 600; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
    }

    button:hover { 
      background: #1565C0; 
    }

    button:disabled { 
      background: #90CAF9; 
      cursor: not-allowed; 
    }

    .msg { 
      margin-top: 14px; 
      font-size: 13px; 
      text-align: center; 
      color: #D32F2F; 
      min-height: 18px; 
    } 

    .strength { 
      font-size: 12px; 
      margin-top: 4px; 
      font-weight: 600; 
    }

    .steps { 
      display: flex; 
      justify-content: center; 
      gap: 8px; 
      margin-bottom: 28px; 
    }

    .step { 
      width: 28px; 
      height: 6px; 
      border-radius: 3px; 
      background: #BBDEFB; 
    }

    .step.active { 
      background: #1976D2; 
    }
  </style>
</head>
<body>
<div class="card">
  
  <div class="steps">
    <div class="step active"></div>
    <div class="step active"></div>
    <div class="step active"></div>
    <div class="step"></div>
  </div>

  <h2>Buat Password Baru</h2>

  <p class="subtitle">Buat password baru yang kuat untuk akun Anda.</p>

  <div class="field">
    <label>Password Baru</label>
    <div class="input-wrap">
      <input type="password" id="pw" placeholder="Minimal 6 karakter" oninput="checkStrength()"/>
      <span class="toggle-pw" onclick="togglePw('pw', this)">👁</span>
    </div>
    <div class="strength" id="strength"></div>
  </div>

  <div class="field">
    <label>Konfirmasi Password</label>
    <div class="input-wrap">
      <input type="password" id="pw2" placeholder="Ulangi password baru"/>
      <span class="toggle-pw" onclick="togglePw('pw2', this)">👁</span>
    </div>
  </div>

  <button onclick="resetPassword()">Simpan Password</button>

  <p class="msg" id="msg"></p>
</div>

<script>
  const hp = sessionStorage.getItem('fp_hp');
  if (!hp) window.location.href = 'index.html';

  function togglePw(id, el) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    el.textContent = inp.type === 'password' ? '👁' : '🙈';
  }

  function checkStrength() {
    const pw = document.getElementById('pw').value;
    const el = document.getElementById('strength');
    if (pw.length === 0) { el.textContent = ''; return; }
    if (pw.length < 6) { el.style.color = '#D32F2F'; el.textContent = '⚠ Terlalu pendek'; }
    else if (pw.length < 10) { el.style.color = '#F57C00'; el.textContent = '🟡 Sedang'; }
    else { el.style.color = '#2E7D32'; el.textContent = '✅ Kuat'; }
  }

  async function resetPassword() {
    const password = document.getElementById('pw').value;
    const confirmPassword = document.getElementById('pw2').value;
    const msg = document.getElementById('msg');
    msg.style.color = '#D32F2F';

    if (!password || !confirmPassword) { msg.textContent = 'Semua field wajib diisi.'; return; }
    if (password !== confirmPassword) { msg.textContent = 'Password dan konfirmasi tidak cocok.'; return; }
    if (password.length < 6) { msg.textContent = 'Password minimal 6 karakter.'; return; }

    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ hp, password, confirmPassword })
      });
      const data = await res.json();
      if (data.success) {
        sessionStorage.clear();
        window.location.href = 'success.html';
      } else {
        msg.textContent = data.message;
      }
    } catch {
      msg.textContent = 'Gagal terhubung ke server.';
    }
  }
</script>
</body>
</html>
